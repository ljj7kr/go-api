version: "2"

sql:
  - engine: "mysql"
    schema:
      - "sql/schema/*.sql"
    queries:
      - "sql/queries/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/gen/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_result_struct_pointers: false
        emit_params_struct_pointers: false
        emit_pointers_for_null_types: true